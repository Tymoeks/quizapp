<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AR Paint</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #00FFB2;
    --bg: #0a0a0f;
    --panel: rgba(10,10,15,0.85);
    --glass: rgba(255,255,255,0.06);
    --text: #e8e8ec;
    --text-dim: rgba(255,255,255,0.45);
    --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'DM Sans',sans-serif; color:var(--text); touch-action:none; }

  #camera { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; transform:scaleX(-1); }
  #paintCanvas { position:fixed; inset:0; width:100%; height:100%; z-index:1; touch-action:none; }

  /* Top bar */
  .topbar {
    position:fixed; top:0; left:0; right:0; z-index:10;
    display:flex; align-items:center; justify-content:space-between;
    padding:calc(env(safe-area-inset-top,12px) + 8px) 16px 10px;
    background:linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    pointer-events:none;
  }
  .topbar > * { pointer-events:auto; }
  .logo { font-family:'Space Mono',monospace; font-size:18px; color:var(--accent); letter-spacing:-0.5px; }
  .logo span { color:var(--text); opacity:0.5; }

  /* Color picker strip */
  .colorbar {
    position:fixed; bottom:0; left:0; right:0; z-index:10;
    padding:12px 16px calc(env(safe-area-inset-bottom,12px) + 12px);
    background:linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    display:flex; align-items:center; gap:10px;
  }
  .color-dot {
    width:36px; height:36px; border-radius:50%; border:2px solid transparent;
    cursor:pointer; transition:transform 0.2s, border-color 0.2s;
    flex-shrink:0;
  }
  .color-dot.active { border-color:#fff; transform:scale(1.25); }
  .color-dot:active { transform:scale(0.9); }

  .size-slider {
    flex:1; -webkit-appearance:none; appearance:none;
    height:4px; background:rgba(255,255,255,0.15); border-radius:2px; outline:none;
    margin:0 6px;
  }
  .size-slider::-webkit-slider-thumb {
    -webkit-appearance:none; width:22px; height:22px; border-radius:50%;
    background:var(--accent); cursor:pointer;
  }

  .btn-icon {
    width:40px; height:40px; border-radius:50%; border:none;
    background:var(--glass); color:var(--text); font-size:18px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    transition:background 0.2s;
  }
  .btn-icon:active { background:rgba(255,255,255,0.15); }
  .btn-icon.eraser-active { background:var(--accent); color:#000; }

  /* Minimap */
  .minimap {
    position:fixed; bottom:90px; right:12px; z-index:10;
    width:120px; height:120px; border-radius:14px;
    overflow:hidden; border:2px solid rgba(255,255,255,0.12);
    box-shadow:0 4px 24px rgba(0,0,0,0.5);
    background:#1a1a2e;
  }
  .minimap canvas { width:100%; height:100%; }

  /* Permissions overlay */
  .perm-overlay {
    position:fixed; inset:0; z-index:100;
    background:var(--bg); display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:20px; padding:32px;
    text-align:center; transition:opacity 0.4s;
  }
  .perm-overlay.hidden { opacity:0; pointer-events:none; }
  .perm-overlay h1 { font-family:'Space Mono',monospace; font-size:28px; color:var(--accent); }
  .perm-overlay p { color:var(--text-dim); max-width:300px; line-height:1.5; }
  .perm-btn {
    padding:14px 36px; border-radius:99px; border:none;
    background:var(--accent); color:#000; font-weight:700; font-size:16px;
    cursor:pointer; font-family:'DM Sans',sans-serif;
  }
  .perm-btn:active { opacity:0.8; }

  /* Crosshair */
  .crosshair {
    position:fixed; pointer-events:none; z-index:5;
    width:24px; height:24px; border-radius:50%;
    border:2px solid rgba(255,255,255,0.7);
    transform:translate(-50%,-50%); display:none;
  }

  /* Undo btn */
  .undo-btn { position:fixed; top:calc(env(safe-area-inset-top,12px) + 12px); right:16px; z-index:10; }
</style>
</head>
<body>

<div class="perm-overlay" id="permOverlay">
  <h1>AR Paint</h1>
  <p>Paint in augmented reality. Your strokes stay anchored in the real world.</p>
  <button class="perm-btn" id="startBtn">Enable Camera & Location</button>
</div>

<video id="camera" autoplay playsinline muted></video>
<canvas id="paintCanvas"></canvas>
<div class="crosshair" id="crosshair"></div>

<div class="topbar">
  <div class="logo">AR<span>Paint</span></div>
</div>

<button class="btn-icon undo-btn" id="undoBtn" title="Undo">↩</button>

<div class="minimap" id="minimap">
  <canvas id="mapCanvas" width="240" height="240"></canvas>
</div>

<div class="colorbar">
  <button class="btn-icon" id="eraserBtn" title="Eraser">⌫</button>
  <div class="color-dot active" data-color="rgba(0,255,178,0.45)" style="background:#00FFB2"></div>
  <div class="color-dot" data-color="rgba(255,59,108,0.45)" style="background:#FF3B6C"></div>
  <div class="color-dot" data-color="rgba(108,92,255,0.45)" style="background:#6C5CFF"></div>
  <div class="color-dot" data-color="rgba(255,214,0,0.45)" style="background:#FFD600"></div>
  <div class="color-dot" data-color="rgba(0,180,255,0.45)" style="background:#00B4FF"></div>
  <input type="range" class="size-slider" id="sizeSlider" min="4" max="40" value="14">
</div>

<script>
const video = document.getElementById('camera');
const canvas = document.getElementById('paintCanvas');
const ctx = canvas.getContext('2d');
const mapCanvas = document.getElementById('mapCanvas');
const mCtx = mapCanvas.getContext('2d');
const crosshair = document.getElementById('crosshair');
const permOverlay = document.getElementById('permOverlay');
const sizeSlider = document.getElementById('sizeSlider');
const eraserBtn = document.getElementById('eraserBtn');
const undoBtn = document.getElementById('undoBtn');

let painting = false;
let currentColor = 'rgba(0,255,178,0.45)';
let brushSize = 14;
let erasing = false;
let strokes = []; // array of stroke arrays for undo
let currentStroke = [];
let userLat = null, userLng = null;
let paintMarkers = []; // {lat, lng, color}
const MAP_RADIUS = 0.002; // degrees shown in minimap

function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
  redraw();
}

function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const stroke of strokes) {
    if (stroke.length < 2) continue;
    ctx.beginPath();
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.strokeStyle = stroke[0].color;
    ctx.lineWidth = stroke[0].size;
    if (stroke[0].erase) ctx.globalCompositeOperation = 'destination-out';
    else ctx.globalCompositeOperation = 'source-over';
    ctx.moveTo(stroke[0].x, stroke[0].y);
    for (let i = 1; i < stroke.length; i++) {
      const p0 = stroke[i - 1], p1 = stroke[i];
      const mx = (p0.x + p1.x) / 2, my = (p0.y + p1.y) / 2;
      ctx.quadraticCurveTo(p0.x, p0.y, mx, my);
    }
    ctx.stroke();
  }
  ctx.globalCompositeOperation = 'source-over';
}

// Color dots
document.querySelectorAll('.color-dot').forEach(dot => {
  dot.addEventListener('click', () => {
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
    dot.classList.add('active');
    currentColor = dot.dataset.color;
    erasing = false;
    eraserBtn.classList.remove('eraser-active');
  });
});

sizeSlider.addEventListener('input', e => brushSize = +e.target.value);

eraserBtn.addEventListener('click', () => {
  erasing = !erasing;
  eraserBtn.classList.toggle('eraser-active', erasing);
});

undoBtn.addEventListener('click', () => {
  if (strokes.length) { strokes.pop(); redraw(); }
});

// Drawing
function getPos(e) {
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX, y: t.clientY };
}

canvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(getPos(e)); }, { passive:false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); moveDraw(getPos(e)); }, { passive:false });
canvas.addEventListener('touchend', e => { e.preventDefault(); endDraw(); });
canvas.addEventListener('mousedown', e => startDraw(getPos(e)));
canvas.addEventListener('mousemove', e => { if (painting) moveDraw(getPos(e)); });
canvas.addEventListener('mouseup', endDraw);

function startDraw(pos) {
  painting = true;
  currentStroke = [{ x:pos.x, y:pos.y, color:erasing?'rgba(0,0,0,1)':currentColor, size:brushSize, erase:erasing }];
  crosshair.style.display = 'block';
  crosshair.style.left = pos.x+'px'; crosshair.style.top = pos.y+'px';
  crosshair.style.width = brushSize+'px'; crosshair.style.height = brushSize+'px';
}

function moveDraw(pos) {
  if (!painting) return;
  currentStroke.push({ x:pos.x, y:pos.y, color:erasing?'rgba(0,0,0,1)':currentColor, size:brushSize, erase:erasing });
  strokes.push(currentStroke);
  redraw();
  strokes.pop();
  crosshair.style.left = pos.x+'px'; crosshair.style.top = pos.y+'px';
}

function endDraw() {
  if (!painting) return;
  painting = false;
  crosshair.style.display = 'none';
  if (currentStroke.length > 1) {
    strokes.push(currentStroke);
    // Add map marker at midpoint of stroke
    if (userLat !== null) {
      const mid = currentStroke[Math.floor(currentStroke.length/2)];
      const jitterLat = (Math.random()-0.5)*0.001;
      const jitterLng = (Math.random()-0.5)*0.001;
      paintMarkers.push({ lat:userLat+jitterLat, lng:userLng+jitterLng, color:currentColor });
      drawMinimap();
    }
  }
  currentStroke = [];
}

// Minimap
function drawMinimap() {
  const w = mapCanvas.width, h = mapCanvas.height;
  mCtx.clearRect(0,0,w,h);

  // dark bg
  mCtx.fillStyle = '#12121f';
  mCtx.fillRect(0,0,w,h);

  // grid
  mCtx.strokeStyle = 'rgba(255,255,255,0.06)';
  mCtx.lineWidth = 1;
  for (let i=0;i<w;i+=30){ mCtx.beginPath();mCtx.moveTo(i,0);mCtx.lineTo(i,h);mCtx.stroke(); }
  for (let i=0;i<h;i+=30){ mCtx.beginPath();mCtx.moveTo(0,i);mCtx.lineTo(w,i);mCtx.stroke(); }

  if (userLat === null) {
    mCtx.fillStyle = 'rgba(255,255,255,0.3)';
    mCtx.font = '11px DM Sans';
    mCtx.textAlign = 'center';
    mCtx.fillText('No GPS', w/2, h/2);
    return;
  }

  // Paint markers
  for (const m of paintMarkers) {
    const px = ((m.lng - userLng) / MAP_RADIUS) * (w/2) + w/2;
    const py = ((userLat - m.lat) / MAP_RADIUS) * (h/2) + h/2;
    if (px<0||px>w||py<0||py>h) continue;
    // Extract solid color from rgba
    const solid = m.color.replace(/,[\d.]+\)/, ',1)');
    mCtx.fillStyle = solid;
    mCtx.beginPath();
    mCtx.arc(px, py, 4, 0, Math.PI*2);
    mCtx.fill();
  }

  // User dot
  mCtx.fillStyle = var_accent();
  mCtx.beginPath();
  mCtx.arc(w/2, h/2, 6, 0, Math.PI*2);
  mCtx.fill();
  mCtx.strokeStyle = '#fff';
  mCtx.lineWidth = 2;
  mCtx.stroke();

  // Pulse ring
  const pulse = (Date.now() % 2000) / 2000;
  mCtx.strokeStyle = `rgba(0,255,178,${1-pulse})`;
  mCtx.lineWidth = 1.5;
  mCtx.beginPath();
  mCtx.arc(w/2, h/2, 6 + pulse * 18, 0, Math.PI*2);
  mCtx.stroke();

  // Scale label
  mCtx.fillStyle = 'rgba(255,255,255,0.35)';
  mCtx.font = '9px DM Sans';
  mCtx.textAlign = 'left';
  const meters = Math.round(MAP_RADIUS * 111320);
  mCtx.fillText(`~${meters}m`, 6, h - 6);
}

function var_accent() { return '#00FFB2'; }

// Animate minimap pulse
function animateMap() { if (userLat!==null) drawMinimap(); requestAnimationFrame(animateMap); }
animateMap();

// Start
document.getElementById('startBtn').addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'environment', width:{ideal:1920}, height:{ideal:1080} },
      audio:false
    });
    video.srcObject = stream;
    permOverlay.classList.add('hidden');
    resize();
  } catch(e) {
    alert('Camera access is required.');
    return;
  }

  // Geolocation
  if ('geolocation' in navigator) {
    navigator.geolocation.watchPosition(
      pos => { userLat = pos.coords.latitude; userLng = pos.coords.longitude; drawMinimap(); },
      () => { drawMinimap(); },
      { enableHighAccuracy:true, maximumAge:5000 }
    );
  }
});

window.addEventListener('resize', resize);
resize();
drawMinimap();
</script>
</body>
</html>
